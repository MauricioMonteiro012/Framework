<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativação de Conta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Ativação de Conta</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="message {{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="form-box">
            <p>Digite o celular e o código enviados para ativar sua conta.</p>
            <form id="ativacaoForm">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>

                <label for="celular">Celular</label>
                <input type="text" id="celular" name="celular" placeholder="+55 11 91234-5678" required>

                <label for="codigo">Código de ativação</label>
                <input type="text" id="codigo" name="codigo" placeholder="0000" required>

                <button type="submit">Ativar Conta</button>
            </form>
            <p class="small-text">
                Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a>
            </p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
